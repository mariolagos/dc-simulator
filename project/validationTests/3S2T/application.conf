# =========================
#  DcSim scenario: 3S2T
#  - 3 stations
#  - 2 trains
#  - shared T1 profile, staggered departures
# =========================

dcsim {
  hash = "hash"

  exportInputs   = "validationTests/3S2T"
  exportTrainId  = "T1"
  exportRunExcel = "project/validationTests/templates/T1/A-B.xlsx"
  export.enabled = false

  simulationControl {
    tickDurationSec = 1.0
    simulationStart = "00:00:00"
    simulationEnd   = "00:02:00"
    simulationSpeed = "FAST"
    stopAfterSteps  = 10
  }

  export {
    csvEveryNthStep = 1
  }

  grid {
    groundNodeId = 0

    nodes = [
      { id = 0,  name = "GND",    position = "1 0+100" },
      { id = 1,  name = "N0",     position = "1 0+000" },
      { id = 2,  name = "N1",     position = "1 1+500" },
      { id = 3,  name = "N2",     position = "1 3+000" },
      { id = 99, name = "ANCHOR", position = "1 3+100" }
    ]

    lines = [
      { id = "L0", from = 1, to = 2,  lengthM = 1500, rPerKm = 0.03 },
      { id = "L1", from = 2, to = 3,  lengthM = 1500, rPerKm = 0.03 },
      { id = "L2", from = 3, to = 99, lengthM = 100,  rPerKm = 0.03 }
    ]

    substations = [
      { id = "SS0", nodeId = 1, emf = 900.0, internalResistance = 0.1, rectifierType = "DIODE" },
      { id = "SS1", nodeId = 2, emf = 900.0, internalResistance = 0.1, rectifierType = "DIODE" },
      { id = "SS2", nodeId = 3, emf = 900.0, internalResistance = 0.1, rectifierType = "DIODE" }
    ]

    anchorNodeId = 99
  }

  trains {
    defaults {
      maxVoltage    = 1000.0
      minVoltage    = 500.0
      cutoffVoltage = 600.0
      maxCurrentA   = 1e30
    }
  }

  electrics.substations.defaults {
    allowBackfeed = false
    maxCurrentA   = 0.0
  }

  track {
    stations = [
      { name = "A", abbreviation = "A", position = "1 0+000" },
      { name = "B", abbreviation = "B", position = "1 3+000" }
    ]
  }

  traffic {
    timetable {
      trains = [
        { id = "Train1", templateId = "T1", departure = "00:00:00", count = 1 },
        { id = "Train2", templateId = "T1", departure = "00:00:50", count = 1 }
      ]
    }
    templates = {
      T1 = {
        stops = [
          { signature = "A", departure = "00:00:00" },
          { signature = "B", arrival   = "00:02:00" }
        ]
      }
    }
  }

  powerProfiles {
    motoringAndAuxiliariesInSameModel = false
    auxiliaryPower = 0
    templates = [
      {
        id     = "T1"
        folder = "project/validationTests/3S1T/T1"
        legs = [
          { fromStation = "A", toStation = "B", file = "A-B.xlsx" }
        ]
      }
    ]
  }

  train {
    vMS     = 25.0
    pW      = 0.0
    Rmin    = 5e-6
    epsFrac = 1e-4
  }

  verbose {
    all = true
  }

  projects.root = "project"
  run.project   = "3S2T"
  run.scenario  = "scenario1"

  dcsim.paths {
    longtable  = "${dcsim.projects.root}/${dcsim.run.project}/${dcsim.run.scenario}/longtable.csv"
    pivots_dir = "${dcsim.projects.root}/${dcsim.run.project}/${dcsim.run.scenario}/pivots"
  }

  pivot.columns {
    time     = "time_s"
    kind     = "kind"
    id       = "id"
    V        = "V_V"
    I        = "I_A"
    P        = "P_W"
    req      = "req_W"
    pos      = "pos_m"
    speed    = "speed_mps"
    project  = "project"
    scenario = "scenario"
    hash     = "hash_tag"
    VA       = "V_A_V"
    VB       = "V_B_V"
    P_loss   = "P_loss_W"
  }

  pivot.format {
    decimals = 6
    locale   = "US"
  }

  pivot.units {
    power   = "W"
    energy  = "J"
    voltage = "V"
    current = "A"
  }
}

grid = ${dcsim.grid}