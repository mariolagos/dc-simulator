# =========================
#  DcSim scenario: C1
#  - 1 station
#  - 5 trains
# =========================

dcsim {
  hash = "C1"

  exportInputs   = "validationTests/C1"
  exportTrainId  = "T1"
  exportRunExcel = "project/validationTests/C1/templates/t1_up_A-B.xlsx"
  export.enabled = true

  simulationControl {
    tickDurationSec = 1.0
    simulationStart = "00:00:00"
    simulationEnd   = "00:05:00"   # justera efter C1-data
    simulationSpeed = "FAST"
  }

  export {
    csvEveryNthStep = 1
    exportResolution_s = 1
  }

grid {
  groundNodeId = 0
    u_nominal_V = 750
    u_min_V = 600
    u_max_V = 900
    u_cutoff_V = 950
    i_train_max_A = 7000

nodes = [
  { id = 0,  name = "GND",    node_id = 0,  position = "1 0+100", nodeKind = "GROUND" },
  { id = 1,  name = "F1",     node_id = 1,  position = "1 0+000" },
  { id = 2,  name = "F2",     node_id = 2,  position = "1 2+200" },
  { id = 3,  name = "F3",     node_id = 3,  position = "1 2+300" },
  { id = 4,  name = "F4",     node_id = 4,  position = "1 3+500" },
  { id = 5,  name = "F5",     node_id = 5,  position = "1 4+700" },
  { id = 6,  name = "R1",     node_id = 6,  position = "1 0+000" },
  { id = 7,  name = "R2",     node_id = 7,  position = "1 1+200" },
  { id = 8,  name = "R3",     node_id = 8,  position = "1 2+300" },
  { id = 9,  name = "R4",     node_id = 9,  position = "1 3+500" },
  { id = 10, name = "R5",     node_id = 10, position = "1 4+700" },
  { id = 99, name = "ANCHOR", node_id = 99, position = "1 4+700" }
]

  lines = [
    { from_node_id = "F1", to_node_id = "F2", lengthM = 1300, rPerKm = 0.02 },
    { from_node_id = "F2", to_node_id = "F3", lengthM = 1100, rPerKm = 0.02 },
    { from_node_id = "F3", to_node_id = "F4", lengthM = 1200, rPerKm = 0.02 },
    { from_node_id = "F4", to_node_id = "F5", lengthM = 1200, rPerKm = 0.02 },

    { from_node_id = "F6", to_node_id = "F6", lengthM = 1300, rPerKm = 0.015 },
    { from_node_id = "F7", to_node_id = "F7", lengthM = 1100, rPerKm = 0.015 },
    { from_node_id = "F8", to_node_id = "F8", lengthM = 1200, rPerKm = 0.015 },
    { from_node_id = "F9", to_node_id = "F10", lengthM = 1200, rPerKm = 0.015 }
  10

substations = [
  { id = "SS0", nodeId = 1, emf = 780.0, internalResistance = 0.1, rectifierType = "DIODE" }
  { id = "SS1", nodeId = 2, emf = 780.0, internalResistance = 0.1, rectifierType = "DIODE" }
  { id = "SS2", nodeId = 3, emf = 780.0, internalResistance = 0.1, rectifierType = "DIODE" }
  { id = "SS3", nodeId = 4, emf = 780.0, internalResistance = 0.1, rectifierType = "DIODE" }
  { id = "SS4", nodeId = 5, emf = 780.0, internalResistance = 0.1, rectifierType = "DIODE" }
]
  power_installations = [
    { installation_id = "SS0", installation_type = "SUBSTATION", emf_v = 780.0, internal_resistance_ohm = 0.1, rectifier_type = "DIODE" },
    { installation_id = "SS1", installation_type = "SUBSTATION", emf_v = 780.0, internal_resistance_ohm = 0.1, rectifier_type = "DIODE" },
    { installation_id = "SS2", installation_type = "SUBSTATION", emf_v = 780.0, internal_resistance_ohm = 0.1, rectifier_type = "DIODE" },
    { installation_id = "SS3", installation_type = "SUBSTATION", emf_v = 780.0, internal_resistance_ohm = 0.1, rectifier_type = "DIODE" },
    { installation_id = "SS4", installation_type = "SUBSTATION", emf_v = 780.0, internal_resistance_ohm = 0.1, rectifier_type = "DIODE" }
  ]

  power_connections = [
    { installation_id = "SS0", node_id = "F1", connection_type = "FEEDING" },
    { installation_id = "SS0", node_id = "R1", connection_type = "RETURN" },

    { installation_id = "SS1", node_id = "F2", connection_type = "FEEDING" },
    { installation_id = "SS1", node_id = "R2", connection_type = "RETURN" },

    { installation_id = "SS2", node_id = "F3", connection_type = "FEEDING" },
    { installation_id = "SS2", node_id = "R3", connection_type = "RETURN" },

    { installation_id = "SS3", node_id = "F4", connection_type = "FEEDING" },
    { installation_id = "SS3", node_id = "R4", connection_type = "RETURN" },

    { installation_id = "SS4", node_id = "F5", connection_type = "FEEDING" },
    { installation_id = "SS4", node_id = "R5", connection_type = "RETURN" }
  ]

  anchorNodeId = "ANCHOR"
}

  trains {
    defaults {
      maxVoltage    = 1000.0
      minVoltage    = 500.0
      cutoffVoltage = 600.0
      maxCurrentA   = 1e30
    }
  }

  electrics.substations.defaults {
    allowBackfeed = false
    maxCurrentA   = 0.0
  }

  track {
    stations = [
      { name = "A", abbreviation = "A", position = "1 0+100" },
      { name = "B", abbreviation = "B", position = "1 1+203" }
      { name = "C", abbreviation = "C", position = "1 2+011" },
      { name = "D", abbreviation = "D", position = "1 2+914" }
      { name = "E", abbreviation = "E", position = "1 4+653" }
    ]
  }

  traffic {
    timetable {
trains = [
  { id = "Train1", templateId = "T1", departure = "00:00:00", runExcel = "templates/t1_up_A-B.xlsx" },
  { id = "Train2", templateId = "T2", departure = "00:01:30", runExcel = "templates/t1_down_A-B.xlsx" },
  { id = "Train3", templateId = "T3", departure = "00:03:00", runExcel = "templates/t2_up_A-B.xlsx" },
  { id = "Train4", templateId = "T4", departure = "00:04:30", runExcel = "templates/t1_down_A-B.xlsx" }
]    }
    templates = {
      T1 = {
        stops = [
          { signature = "A", departure = "00:00:00" },
          { signature = "B", arrival   = "00:08:35" }
        ]
      }
      T2 = {
        stops = [
          { signature = "A", departure = "00:00:00" },
          { signature = "B", arrival   = "00:09:32" }
        ]
      }
      T3 = {
        stops = [
          { signature = "A", departure = "00:00:00" },
          { signature = "B", arrival   = "00:08:32" }
        ]
      }
      T4 = {
        stops = [
          { signature = "A", departure = "00:00:00" },
          { signature = "B", arrival   = "00:09:31" }
        ]
      }
    }
  }

  powerProfiles {
    motoringAndAuxiliariesInSameModel = false
    auxiliaryPower = 0
    templates = [
      {
        id     = "T1"
        folder = "project/validationTests/C1/templates"
        legs = [
          { fromStation = "A", toStation = "B", file = "t1_up_A-B.xlsx" }
        ]
      }
      {
        id     = "T2"
        folder = "project/validationTests/C1/templates"
        legs = [
          { fromStation = "A", toStation = "B", file = "t1_down_A-B.xlsx" }
       ]
      }
      {
        id     = "T3"
        folder = "project/validationTests/C1/templates"
        legs = [
          { fromStation = "A", toStation = "B", file = "t2_up_A-B.xlsx" }
        ]
      }
      {
        id     = "T4"
        folder = "project/validationTests/C1/templates"
        legs = [
        { fromStation = "A", toStation = "B", file = "t1_down_A-B.xlsx" }
         ]
      }
    ]
  }

  train {
    vMS     = 25.0
    pW      = 0.0
    Rmin    = 5e-6
    epsFrac = 1e-4
  }

  verbose {
    all = true
  }

  projects.root = "project"
  run.project   = "1S5T"
  run.scenario  = "scenario1"

  dcsim.paths {
    longtable  = "${dcsim.projects.root}/${dcsim.run.project}/${dcsim.run.scenario}/longtable.csv"
    pivots_dir = "${dcsim.projects.root}/${dcsim.run.project}/${dcsim.run.scenario}/pivots"
  }

  pivot.columns {
    time     = "time_s"
    kind     = "kind"
    id       = "id"
    V        = "V_V"
    I        = "I_A"
    P        = "P_W"
    req      = "req_W"
    pos      = "pos_m"
    speed    = "speed_mps"
    project  = "project"
    scenario = "scenario"
    hash     = "hash_tag"
    VA       = "V_A_V"
    VB       = "V_B_V"
    P_loss   = "P_loss_W"
  }

  pivot.format {
    decimals = 6
    locale   = "US"
  }

  pivot.units {
    power   = "W"
    energy  = "J"
    voltage = "V"
    current = "A"
  }
}

grid = ${dcsim.grid}