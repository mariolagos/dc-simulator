# =========================
#  DcSim scenario: 3subs1train
#  - 3 stations (SS0, SS1, SS2)
#  - 1 line between each station, 1.5 km each
#  - 1 train, constant speed from power template (speedKPH)
# =========================
# Standard-/typiska värden för DC-system:
#
# System                       750V DC  1500V DC
# Nominal spänning, V              750      1500
# Min spänning, V                  500      1000
# Max spänning, V                  900      1800
# Ledningsresistans, ohm/km       0.03      0.08
# Avstånd mellan inmatning, km     1.5         5
#
# Matningsstationerna kan vara inställda på tomgångsspänning som överstiger den nominella, men det slår naturligtvis på
# möjligheten  att återmata. I DC-system är den ofta nära max.
#
# En vanlig konfiguration är att up och down matning sammankopplas i punkter mellan matningsstationerna. Detta för att
# minska resistansen.

dcsim {
  # --- Projekt & scenario ---
#  projects.root = "project"
#  project   = "3S1T"
#  scenario  = "scenario1"
  hash = "hash"
  exportInputs = "validationTests/3S1T"
  exportTrainId = "T1"
  exportRunExcel = "project/validationTests/3S1T/T1/A-B.xlsx"
  export.enabled = true

  # ---- Simulation control ----
  simulationControl {
    tickDurationSec = 1.0
    simulationStart = "00:00:00"
    simulationEnd   = "00:02:00"   # 3.0 km / 25 m/s ≈ 120 s -> slutar vid ankomst => ingen ”studs”
    simulationSpeed = "FAST"
    stopAfterSteps  = 10
  }

  export {
    # Reporting behavior (no physics is fabricated in the writer):
    #
    # false (recommended now): do NOT mirror negative traction (regen) as "P_brake".
    # true: purely a reporting trick — shows P_brake even though regen still flows in the network.
    #       This makes Balance != 0 whenever regen exists.
    treatNegativeBrakingAsBrake = false
    csvEveryNthStep = 1
  }

  # ---- Net model ----
  grid {
    groundNodeId = 0

    # Node positions
    # NOTE: for the moment the ground node must have a unique position, this restriction should be removed
    nodes = [
      { id = 0,  name = "GND",    position = "1 0+100" }
      { id = 1,  name = "N0",     position = "1 0+000" }   # SS0 @ 0 m
      { id = 2,  name = "N1",     position = "1 1+500" }   # SS1 @ 1500 m
      { id = 3,  name = "N2",     position = "1 3+000" }   # SS2 @ 3000 m
      { id = 99, name = "ANCHOR", position = "1 3+100" }   # fiktiv anchor node
    ]

    # Catenaries
    lines = [
      { id = "L0", from = 1, to = 2, lengthM = 1500, rPerKm = 0.03 }
      { id = "L1", from = 2, to = 3, lengthM = 1500, rPerKm = 0.03 }
      { id = "L2", from = 3, to = 99, lengthM = 100,  rPerKm = 0.03 }
    ]

    # DC stations (Thevenin → Norton in the solver)
    substations = [
      { id = "SS0", nodeId = 1, emf = 900.0, internalResistance = 0.1, allowBackfeed = false }
      { id = "SS1", nodeId = 2, emf = 900.0, internalResistance = 0.1, allowBackfeed = false }
      { id = "SS2", nodeId = 3, emf = 900.0, internalResistance = 0.1, allowBackfeed = false }
    ]

    # Where DcSimApp should place the train anchor node.
    # This node (99) must be in nodes[] above and be “loose” from the start.
    # this parameter shall be handled internally and removed
    anchorNodeId = 99
  }

  # Elgränser för TrainLoad (som läser Excel-profilen)
  trains {
    defaults {
      maxVoltage    = 1000.0    # Vmax: över denna blockeras regen (dissiperas)
      minVoltage    = 500.0     # Vmin: under denna får bara AUX ligga kvar
      cutoffVoltage = 600.0
      maxCurrentA   = 1e30
    }
  }

  electrics.substations.defaults {
    allowBackfeed = false
    maxCurrentA   = 0.0       # <= 0 disables current limit (no setMaxCurrent())
  }

  # Track-metadata (bara etiketter för profilen)
  track {
    stations = [
      { name = "A", abbreviation = "A", position = "1 0+000" }
      { name = "B", abbreviation = "B", position = "1 3+000" }
    ]
  }

  # Trafikplan: ett tåg T1
  traffic {
    timetable {
      trains = [
        { id = "Train1", templateId = "T1", departure = "00:00:00", count = 1 }
      ]
    }
    templates = {
      T1 = {
        stops = [
          { signature = "A", departure = "00:00:00" },
          { signature = "B", arrival   = "00:02:00" }   # matchar simulationEnd
        ]
      }
    }
  }

  # Effektprofiler – LÄS FRÅN DISK (Excel)
  powerProfiles {
    motoringAndAuxiliariesInSameModel = false
    auxiliaryPower = 0
    templates = [
      {
        id     = "T1"
        folder = "project/3subs1train/T1"   # relativt körkatalogen
        legs = [
          { fromStation = "A", toStation = "B", file = "A-B.xlsx" }  # t.ex. kolumner: time[s], P[kW]
        ]
      }
    ]
    # OBS: lämna ev. "constantKW" helt bortkommenterat – annars körs konstant last.
  }

  # Viktigt: nollställ ankarets CP-last så Excel blir den ENDA lasten från tåget
  train {
    vMS     = 25.0      # används bara för x(t) i ankaret
    pW      = 0.0       # <— gör ankaret strömlöst (ingen konstant CP-last)
    Rmin    = 5e-6
    epsFrac = 1e-4
  }

  verbose {
    all = true   # sätt till false för normal tyst körning
  }

  # --- Projekt & scenario (delat med DcSimApp) ---
  projects.root = "project"
  run.project   = "3subs1train"
  run.scenario  = "scenario1"

  # --- Stigar (styr explicit var longtable och pivots ligger) ---
  dcsim.paths {
    longtable = "${dcsim.projects.root}/${dcsim.run.project}/${dcsim.run.scenario}/longtable.csv"
    pivots_dir = "${dcsim.projects.root}/${dcsim.run.project}/${dcsim.run.scenario}/pivots"
  }

  # --- Kolumn-mapping (om longtable har andra headers) ---
  pivot.columns {
    time     = "time_s"
    kind     = "kind"
    id       = "id"
    V        = "V_V"
    I        = "I_A"
    P        = "P_W"
    req      = "req_W"
    pos      = "pos_m"
    speed    = "speed_mps"
    project  = "project"
    scenario = "scenario"
    hash     = "hash_tag"
    VA       = "V_A_V"
    VB       = "V_B_V"
    P_loss   = "P_loss_W"
  }

  # --- Presentation/format (kan nyttjas av CSV/Excel) ---
  pivot.format {
    decimals = 6
    locale   = "US"
  }
  pivot.units {
    power   = "W"
    energy  = "J"
    voltage = "V"
    current = "A"
  }
}

# Alias på toppnivå så att kod som gör getConfig("grid") fungerar
grid = ${dcsim.grid}
