# Scenariofil för pivot A2
project.id   = "3subs1train"
scenario.id  = "scenario1"
hash_tag     = null            # sätt t.ex. "abc123" om ni märkta RUN-raderna

io {
  root       = "project"       # projektroten
  longtable  = ${io.root} + "/" + ${project.id} + "/" + ${scenario.id} + "/longtable.csv"
  out_dir    = ${io.root} + "/" + ${project.id} + "/" + ${scenario.id} + "/pivots"
  excel      = true            # skapa pivots.xlsx (A2: placeholder om flaggan aktiveras)
}

format {
  decimals   = 6
  locale     = "US"            # deterministisk punkt-separator
}

energy {
  # Teckenkonventioner (behåll default om du inte vet)
  sign.train = "default"       # "default" | "invert"
  sign.node  = "default"       # "default" | "invert"

  # Källkolumner – lämna tomt om de inte finns
  train.aux_col  = "P_aux_W"
  train.burn_col = "P_burn_W"
  line.loss_col  = "P_loss_W"
  line.va_col    = "V_A_V"
  line.vb_col    = "V_B_V"
}

# Kolumnnamn (om din longtable använder andra headers kan du mappa dem här)
columns {
  time   = "time_s"
  kind   = "kind"
  id     = "id"
  V      = "V_V"
  I      = "I_A"
  P      = "P_W"
  req    = "req_W"
  pos    = "pos_m"
  speed  = "speed_mps"
  project= "project"
  scenario="scenario"
  hash   = "hash_tag"
}
