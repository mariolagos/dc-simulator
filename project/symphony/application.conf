    }

    templates = {
      T1 = {
        stops = [
          { signature = "AFL", departure = "08:00:00" },
          { signature = "BAS", arrival = "08:08:00", departure = "08:10:00" },
          { signature = "CEL", arrival = "08:18:00", departure = "08:20:00" },
          { signature = "DBA", departure = "08:30:00" },
          { signature = "EHO", arrival = "08:38:00" },
