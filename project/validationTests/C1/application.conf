# =========================
#  DcSim scenario: C1
#  - 1 station
#  - 5 trains
# =========================

dcsim {
  hash = "C1"

  exportInputs   = "validationTests/C1"
  exportTrainId  = "T1"
  exportRunExcel = "project/validationTests/C1/templates/T1/A-B.xlsx"
  export.enabled = false

  simulationControl {
    tickDurationSec = 1.0
    simulationStart = "00:00:00"
    simulationEnd   = "00:05:00"   # justera efter C1-data
    simulationSpeed = "FAST"
  }

  export {
    csvEveryNthStep = 1
  }

  grid {
    groundNodeId = 0

    # NOTE:
    # We keep ANCHOR for legacy compatibility, but also add a real end node at 3+000
    # so physical track extent remains meaningful even when ANCHOR is ignored in validation.
    nodes = [
      { id = 0,  name = "GND",    position = "1 0+100"  },
      { id = 1,  name = "F1",     position = "1 0+000" },
      { id = 2,  name = "F2",     position = "1 1+200"  },
      { id = 3,  name = "F3",     position = "1 2+300"  },
      { id = 4,  name = "F4",     position = "1 3+500"  },
      { id = 5,  name = "F5",     position = "1 4+700"  },
      #{ id = 6,  name = "R1",     position = "1 0+000" },
      #{ id = 7,  name = "R2",     position = "1 1+200"  },
      #{ id = 8,  name = "R3",     position = "1 2+300"  },
      #{ id = 9,  name = "R4",     position = "1 3+500"  },
      #{ id = 10, name = "R5",     position = "1 4+700"  },
      { id = 99, name = "ANCHOR", position = "1 4+700"  }
    ]

    lines = [
      { id = "L_F1_2",  from = 1, to = 2,  lengthM = 1300, rPerKm = 0.02 },
      { id = "L_F2_3",  from = 2, to = 3,  lengthM = 1100, rPerKm = 0.02 },
      { id = "L_F3_4",  from = 3, to = 4,  lengthM = 1200, rPerKm = 0.02 },
      { id = "L_F4_5",  from = 4, to = 5,  lengthM = 1200, rPerKm = 0.02 },
      #{ id = "L_R6_7",  from = 6, to = 7,  lengthM = 1300, rPerKm = 0.015 },
      #{ id = "L_R7_8",  from = 7, to = 8,  lengthM = 1100, rPerKm = 0.015 },
      #{ id = "L_R8_9",  from = 8, to = 9,  lengthM = 1200, rPerKm = 0.015 },
      #{ id = "L_R9_10", from = 9, to = 10, lengthM = 1200, rPerKm = 0.015 }
   ]

    substations = [
      { id = "SS0", nodeId = 1,  emf = 780.0, internalResistance = 0.1, rectifierType = "DIODE" }
      { id = "SS1", nodeId = 2,  emf = 780.0, internalResistance = 0.1, rectifierType = "DIODE" }
      { id = "SS2", nodeId = 3,  emf = 780.0, internalResistance = 0.1, rectifierType = "DIODE" }
      { id = "SS3", nodeId = 4,  emf = 780.0, internalResistance = 0.1, rectifierType = "DIODE" }
      { id = "SS4", nodeId = 5,  emf = 780.0, internalResistance = 0.1, rectifierType = "DIODE" }
      #{ id = "SS0", nodeId = 6,  emf = 780.0, internalResistance = 0.1, rectifierType = "DIODE" }
      #{ id = "SS1", nodeId = 7,  emf = 780.0, internalResistance = 0.1, rectifierType = "DIODE" }
      #{ id = "SS2", nodeId = 8,  emf = 780.0, internalResistance = 0.1, rectifierType = "DIODE" }
      #{ id = "SS3", nodeId = 9,  emf = 780.0, internalResistance = 0.1, rectifierType = "DIODE" }
      #{ id = "SS4", nodeId = 10, emf = 780.0, internalResistance = 0.1, rectifierType = "DIODE" }
    ]

    anchorNodeId = 99
  }

  trains {
    defaults {
      maxVoltage    = 1000.0
      minVoltage    = 500.0
      cutoffVoltage = 600.0
      maxCurrentA   = 1e30
    }
  }

  electrics.substations.defaults {
    allowBackfeed = false
    maxCurrentA   = 0.0
  }

  track {
    stations = [
      { name = "A", abbreviation = "A", position = "1 0+000" },
      { name = "B", abbreviation = "B", position = "1 1+203" }
      { name = "C", abbreviation = "C", position = "1 2+011" },
      { name = "D", abbreviation = "D", position = "1 2+914" }
      { name = "E", abbreviation = "E", position = "1 4+653" }
    ]
  }

  traffic {
    timetable {
      trains = [
        { id = "Train1", templateId = "T1", departure = "00:00:00", count = 1 },
        { id = "Train2", templateId = "T2", departure = "00:01:30", count = 1 },
        { id = "Train3", templateId = "T3", departure = "00:03:00", count = 1 },
        { id = "Train4", templateId = "T4", departure = "00:04:30", count = 1 },
      ]
    }
    templates = {
      T1 = {
        stops = [
          { signature = "A", departure = "00:00:00" },
          { signature = "B", arrival   = "00:08:35" }
        ]
      }
      T2 = {
        stops = [
          { signature = "B", departure = "00:00:00" },
          { signature = "A", arrival   = "00:09:32" }
        ]
      }
      T3 = {
        stops = [
          { signature = "A", departure = "00:00:00" },
          { signature = "B", arrival   = "00:08:32" }
        ]
      }
      T4 = {
        stops = [
          { signature = "B", departure = "00:00:00" },
          { signature = "A", arrival   = "00:09:31" }
        ]
      }
    }
  }

  powerProfiles {
    motoringAndAuxiliariesInSameModel = false
    auxiliaryPower = 0
    templates = [
      {
        id     = "T1"
        folder = "project/validationTests/C1/templates/T1"
        legs = [
          { fromStation = "A", toStation = "B", file = "A-B.xlsx" }
        ]
      }
      {
        id     = "T2"
        folder = "project/validationTests/C1/templates/T2"
        legs = [
          { fromStation = "B", toStation = "A", file = "B-A.xlsx" }
        ]
      }
      {
        id     = "T3"
        folder = "project/validationTests/C1/templates/T3"
        legs = [
          { fromStation = "A", toStation = "B", file = "A-B.xlsx" }
        ]
      }
      {
        id     = "T4"
        folder = "project/validationTests/C1/templates/T4"
        legs = [
          { fromStation = "B", toStation = "A", file = "B-A.xlsx" }
        ]
      }
    ]
  }

  train {
    vMS     = 25.0
    pW      = 0.0
    Rmin    = 5e-6
    epsFrac = 1e-4
  }

  verbose {
    all = true
  }

  projects.root = "project"
  run.project   = "1S5T"
  run.scenario  = "scenario1"

  dcsim.paths {
    longtable  = "${dcsim.projects.root}/${dcsim.run.project}/${dcsim.run.scenario}/longtable.csv"
    pivots_dir = "${dcsim.projects.root}/${dcsim.run.project}/${dcsim.run.scenario}/pivots"
  }

  pivot.columns {
    time     = "time_s"
    kind     = "kind"
    id       = "id"
    V        = "V_V"
    I        = "I_A"
    P        = "P_W"
    req      = "req_W"
    pos      = "pos_m"
    speed    = "speed_mps"
    project  = "project"
    scenario = "scenario"
    hash     = "hash_tag"
    VA       = "V_A_V"
    VB       = "V_B_V"
    P_loss   = "P_loss_W"
  }

  pivot.format {
    decimals = 6
    locale   = "US"
  }

  pivot.units {
    power   = "W"
    energy  = "J"
    voltage = "V"
    current = "A"
  }
}

grid = ${dcsim.grid}