project: dc-simulator
default_branch: master

title: "Pivotering A2 – longtable → CSV/XLSX"
branch: "feat/pivot-a2-longtable"

goals:
  - "Bygga pivot-verktyg som läser output/longtable.csv och skriver standardvyer"
  - "Integrera effekter → energi (J) med trapetsmetoden"
  - "Ta fram Excel-rapport (en flik per vy) som bonus"

scope:
  include:
    - "Stations (S1–S3): V_V, I_A, P_W över tid"
    - "Trains (T*): req_W, P_W, pos_m, speed_mps"
    - "Lines (L_*): V_min_V, E_loss_J (+ ev. V_A_mean_V, V_B_mean_V)"
    - "Energy summary per scenario: E_trac_J, E_aux_J, E_regen_J, E_burn_J, E_line_J, E_subs_J, E_total_J"
  exclude:
    - "Ändringar i simuleringskärnan"
    - "Nya exporter i DcSim (longtable-format ligger fast)"

tasks:
  - "Läsa RUN-meta och filtrera på project/scenario/hash_tag"
  - "Implementera trapetsintegration över time_s (robust mot ojämna tidssteg)"
  - "Generera stations.csv, trains.csv, lines.csv, energy.csv"
  - "(Bonus) Skapa pivots.xlsx med en flik per vy"

run:
  - "Kör simulering → generera output/longtable.csv"
  - "./gradlew runPivot --args=\"--project <P> --scenario <S> [--hash <H>] [--excel]\""

notes:
  - "Enheter: W, V, A, m, m/s, J"
  - "NaN tolereras i pivot – rader med saknade värden filtreras logiskt per vy"
