dcsim {
  simulationControl {
    tickDurationSec = 1.0
    simulationStart = "08:00:00"
    stopAfterSteps  = 3
  }

  grid {
    groundNodeId = 0
    anchorNodeId = 2

    nodes = [
      { id=0, position="g"  },   # ground / return
      { id=1, position="S1" },   # substation bus 1
      { id=2, position="T"  },   # train
      { id=3, position="S2" }    # substation bus 2
    ]

    # Two substations, backfeed allowed (can absorb regen)
    substations = [
      { id="S1", nodeId=1, emf=1000.0, internalResistance=0.05, allowBackfeed=true },
      { id="S2", nodeId=3, emf=1000.0, internalResistance=0.05, allowBackfeed=true }
    ]

    # Symmetric feeders to the train node
    lines = [
      { from=1, to=2, resistance=0.10, category="u" },
      { from=2, to=3, resistance=0.10, category="u" }
    ]
  }

  # Constant braking (regen) request = -0.8 MW for 10 minutes
  powerProfiles {
    templates = [
      { id="T1", constantKW=-800.0, duration="00:10:00" }
    ]
  }

  traffic.timetable.trains = [
    { id="T1", templateId="T1", departure="08:00:00" }
  ]

  # Train electrical limits (same as earlier tests)
  trains.defaults {
    cutoffVoltage = 850.0   # regen line-fraction clamp low end
    maxVoltage    = 1000.0  # regen line-fraction clamp high end
    maxCurrentA   = 4000.0
  }
}
