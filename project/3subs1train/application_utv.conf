# =========================
#  DcSim scenario: 3subs1train
#  - 3 stations (SS0, SS1, SS2)
#  - 1 line between each station, 1.5 km each
#  - 1 train, constant speed from power template (speedKPH)
# =========================
# Standard-/typiska värden för DC-system:
#
# System                       750V DC  1500V DC
# Nominal spänning, V              750      1500
# Min spänning, V                  500      1000
# Max spänning, V                  900      1800
# Ledningsresistans, ohm/km       0.03      0.08
# Avstånd mellan inmatning, km     1.5         5
#
# Matningsstationerna kan vara inställda på tomgångsspänning som överstiger den nominella, men det slår naturligtvis på
# möjligheten  att återmata. I DC-system är den ofta nära max.
#
# En vanlig konfiguration är att up och down matning sammankopplas i punkter mellan matningsstationerna. Detta för att
# minska resistansen.

dcsim {

  # ---- Simulation control ----
  simulationControl {
    tickDurationSec = 0.5          # sim-step (s)
    simulationStart = "00:00:00"   # start time
    simulationEnd   = "00:30:00"   # end time
    simulationSpeed = FAST         # or REAL_TIME
    # stopAfterSteps = 2400        # alternatively hard step-stop if you want
  }

    export {
      # Spegla negativ brakingKW (regen) som P_brake i CSV (rapportering endast).
      treatNegativeBrakingAsBrake = true
    }

  # ---- Net model ----
  grid {
    groundNodeId = 0               # define a ground node (0)

    # Node positions
    # NOTE: for the moment the ground node must have a unique position, this restriction should be removed
    nodes = [
      { id = 0, name = "GND", position = "1 0+100"     }
      { id = 1, name = "N0", position = "1 0+000"      }     # SS0
      { id = 2, name = "N1", position = "1 1+500"      }     # SS1
      { id = 3, name = "N2", position = "1 3+000"      }     # SS2
      { id = 4, name = "N3", position = "1 4+500"      }     # SS3
      { id = 5, name = "N4", position = "1 6+000"      }     # SS4
    ]

    # Catenaries
    lines = [
      { id = "L0", from = 1, to = 2, lengthM = 1500, rPerKm = 0.03 }
      { id = "L1", from = 2, to = 3, lengthM = 1500, rPerKm = 0.03 }
      { id = "L2", from = 3, to = 4, lengthM = 1500, rPerKm = 0.03 }
      { id = "L3", from = 4, to = 5, lengthM = 1500, rPerKm = 0.03 }
    ]

    # DC stations (Thevenin → Norton in the solver)
    substations = [
      { id = "SS0", nodeId = 1, emf = 1000.0, internalResistance = 0.01, allowBackfeed = true }
      { id = "SS1", nodeId = 2, emf = 1000.0, internalResistance = 0.01, allowBackfeed = true }
      { id = "SS2", nodeId = 3, emf = 1000.0, internalResistance = 0.01, allowBackfeed = true }
      { id = "SS3", nodeId = 4, emf = 1000.0, internalResistance = 0.01, allowBackfeed = true }
      { id = "SS4", nodeId = 5, emf = 1000.0, internalResistance = 0.01, allowBackfeed = true }
    ]

    # Where DcSimApp should place the train anchor node.
    # This node (99) must be in nodes[] above and be “loose” from the start.
    # this parameter shall be handled internally and removed
    anchorNodeId = 99
  }

  # ---- power profiles (templates) ----
  powerProfiles {
    # Calculation profile (kW over time) + speed in the template
    # This profile should be replaced by reading pre-simulated template movement
    templates = [
      {
        id = "IC200"
        speedKPH = 90                     # används av DcSimApp → vMS = 90/3.6
        points = [
          { time = "00:00:00", kW = 150000 }  # constant power 150 kW
          { time = "00:05:00", kW = 150000 }  # (förläng vid behov)
        ]
      }
    ]

    # Other parameters
    motoringAndAuxiliariesInSameModel = true
    auxiliaryPower = 5000.0            # 5 kW hjälpsystem
  }

  # ---- Trafik (ett tåg) ----
  traffic {
    timetable {
      trains = [
        { id = "T1", templateId = "IC200", departure = "00:00:00", headway = "00:05:00", count = 5, signature = "A" }
        # Vill du override:a hastighet per tåg:
        # { id = "T1", templateId = "IC200", departure = "00:00:00", speedMS = 27.78 }
      ]
    }
  }

  # -------------------------------------------------------------------------------------
  # ---- TILLFÄLLIGA PARAMETRAR UNDER UTVECKLING ----

  train {
    # Fallback-värden om mall/per-tåg saknar hastighet
    vMS     = 25.0
    pW      = 150000.0     # används av TrainAnchorComponent (konstant P)
    Rmin    = 5e-6         # liten skyddsresistans i splits
    epsFrac = 1e-4         # migreringströskel (andel av segmentlängd)
  }
}
