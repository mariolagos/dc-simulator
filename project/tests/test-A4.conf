dcsim {
  simulationControl {
    tickDurationSec = 1.0
    simulationStart = "08:00:00"
    stopAfterSteps  = 3
  }

  grid {
    groundNodeId = 0
    anchorNodeId = 2

    nodes = [
      { id=0, position="g"  },
      { id=1, position="S1" },
      { id=2, position="T1" }
    ]

    substations = [
      {
        id = "S1"
        nodeId = 1
        emf = 900.0
        internalResistance = 0.05
        allowBackfeed = true         # VIKTIGT: kan absorbera regen
      }
    ]

    lines = [
      { from=1, to=2, resistance=0.10, category="u" }
    ]
  }

  powerProfiles {
    templates = [
      { id="T1", constantKW=-500.0, duration="00:10:00" }  // regen 500 kW
    ]
  }

  traffic {
    timetable {
      trains = [
        { id="T1", templateId="T1", departure="08:00:00" }
      ]
    }
  }

  # För A4 vill vi ha tydlig delning mellan nät vs bromsmotstånd
  trains {
    defaults {
      cutoffVoltage = 850.0   # under denna -> 100% till linan (i din modell)
      maxVoltage    = 950.0   # vid/över denna -> 0% till linan (allt till brake)
      maxCurrentA   = 4000.0
    }
  }
}
