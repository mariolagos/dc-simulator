      { id = "SS2", nodeId = 3, emf = 750.0, internalResistance = 0.014 },
      { id = "SS3", nodeId = 5, emf = 750.0, internalResistance = 0.014 },
      { id = "SS4", nodeId = 7, emf = 750.0, internalResistance = 0.014 }
    ]

    # Optional metadata-only connection points
    # connectionPoints = [
    #   { id = "CP-170", nodeId = 1, description = "Change to double catenary" }
    # ]
  }

  traffic {
