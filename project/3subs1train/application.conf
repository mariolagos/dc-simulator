dcsim {
  simulationControl {
    tickDuration   = 1.0              # seconds per tick
    simulationStart = "08:00:00"      # accepts HH:mm[:ss], local date assumed
    simulationEnd   = "09:00:00"
    simulationSpeed = "FAST"
  }

  grid {
    groundNodeId = 0

    nodes = [
      { id = 0, position = "1 0+100" },
      { id = 1, position = "1 0+000" },
      { id = 2, position = "1 0+550" },
      { id = 3, position = "1 1+100" }
    ]

    lines = [
      { from = 1, to = 2, resistance = 0.10, category: "catenary1"  }
      { from = 2, to = 3, resistance = 0.10, category: "catenary1"  }

    # Augmenting feeder in parallel between the same nodes
      { from = 1, to = 2, resistance = 0.10, category: "feeder"  }
      { from = 2, to = 3, resistance = 0.10, category: "feeder"  }

    ]

    # Substations are connected between groundNodeId and the given nodeId
    substations = [
      { id = "S1", nodeId = 1, emf = 1000.0, internalResistance = 0.05 }
      { id = "S2", nodeId = 2, emf = 1000.0, internalResistance = 0.05 }
      { id = "S3", nodeId = 3, emf = 1000.0, internalResistance = 0.05 }
    ]

    # Optional: connection points (metadata only; behavior defined by connected lines)
    # connectionPoints = [
    #   { id = "CP-1", nodeId = 1, description = "Change of feeder section" }
    # ]
  }

  track {
    stations = [
      { name = "A", abbreviation = "A", position = "1 0+000" },
      { name = "B", abbreviation = "B", position = "1 1+100" }
    ]
  }

  traffic {
    timetable {
      trains = [
        { id = "T1", templateId = "T1", departure = "08:00:00", headway = "00:00:00", count = 1, signature = "A" }
      ]
    }

    templates = {
      T1 = {
        stops = [
          { signature = "A", departure = "08:00:00" },
          { signature = "B", arrival = "08:01:09" }
        ]
      }
    }
  }

  powerProfiles {
    motoringAndAuxiliariesInSameModel = false
    auxiliaryPower = 0.0

    # Example template → folder with leg files (xlsx). Adjust paths to your repo.
    templates = [
      {
        id = "T1"
        folder = "project/3subs1train/T1"
        legs = [
          { fromStation = "A", toStation = "B", file = "A-B.xlsx" }
        ]
      }
    ]
  }
}
