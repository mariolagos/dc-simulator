# =========================
#  DcSim scenario: t
# =========================
# Standard-/typiska värden för DC-system:
#
# System                       750V DC  1500V DC
# Nominal spänning, V              750      1500
# Min spänning, V                  500      1000
# Max spänning, V                  900      1800
# Ledningsresistans, ohm/km       0.03      0.08
# Avstånd mellan inmatning, km     1.5         5
#
# Matningsstationerna kan vara inställda på tomgångsspänning som överstiger den nominella, men det slår naturligtvis på
# möjligheten  att återmata. I DC-system är den ofta nära max.
#
# En vanlig konfiguration är att up och down matning sammankopplas i punkter mellan matningsstationerna. Detta för att
# minska resistansen.


dcsim {
  # ---- Simulation control ----
  simulationControl {
    tickDurationSec = 1.0
    simulationStart = "00:00:00"
    simulationEnd   = "00:30:00"
    simulationSpeed = "FAST"
    # stopAfterSteps  = 105
  }

  export {
    treatNegativeBrakingAsBrake = false
    csvEveryNthStep = 1
  }

  # ---- Net model ----
  grid {
    groundNodeId = 0

    # Node positions
    # NOTE: for the moment the ground node must have a unique position, this restriction should be removed
    nodes = [
      { id = 0, name = "GND", position = 0 0+0 }
      { id = 1, name = "R1", position = 1 1+1500 }
      { id = 2, name = "R2", position = 1 3+3000 }
      { id = 3, name = "R3", position = 1 4+4500 }
      { id = 4, name = "R4", position = 1 6+6000 }
      { id = 5, name = "R5", position = 1 7+7500 }
      { id = 6, name = "R6", position = 1 9+9000 }
      { id = 7, name = "R7", position = 1 10+10500 }
      { id = 8, name = "R8", position = 1 12+12000 }
      { id = 9, name = "R9", position = 1 13+13500 }
      { id = 10, name = "R10", position = 1 15+15000 }
      { id = 11, name = "R11", position = 1 16+16500 }
      { id = 12, name = "R12", position = 1 18+18000 }
      { id = 13, name = "R13", position = 1 19+19500 }
      { id = 14, name = "R14", position = 1 21+21000 }
    ]

    # Catenaries
    lines = [
      { id = "L_R_0_1", from = 1, to = 2, lengthM = 1500, rPerKm = 0.03 }
      { id = "L_R_1_2", from = 2, to = 3, lengthM = 1500, rPerKm = 0.03 }
      { id = "L_R_2_3", from = 3, to = 4, lengthM = 1500, rPerKm = 0.03 }
      { id = "L_R_3_4", from = 4, to = 5, lengthM = 1500, rPerKm = 0.03 }
      { id = "L_R_4_5", from = 5, to = 6, lengthM = 1500, rPerKm = 0.03 }
      { id = "L_R_5_6", from = 6, to = 7, lengthM = 1500, rPerKm = 0.03 }
      { id = "L_R_6_7", from = 7, to = 8, lengthM = 1500, rPerKm = 0.03 }
      { id = "L_R_7_8", from = 8, to = 9, lengthM = 1500, rPerKm = 0.03 }
      { id = "L_R_8_9", from = 9, to = 10, lengthM = 1500, rPerKm = 0.03 }
      { id = "L_R_9_10", from = 10, to = 11, lengthM = 1500, rPerKm = 0.03 }
      { id = "L_R_10_11", from = 11, to = 12, lengthM = 1500, rPerKm = 0.03 }
      { id = "L_R_11_12", from = 12, to = 13, lengthM = 1500, rPerKm = 0.03 }
      { id = "L_R_12_13", from = 13, to = 14, lengthM = 1500, rPerKm = 0.03 }
    ]

    # DC stations (Thevenin → Norton in the solver)
    substations = [
{ id = "SS0", nodeId = 1, emf = 900.0, internalResistance = 0.01, allowBackfeed = false }
      { id = "SS1", nodeId = 1, emf = 900, internalResistance = 0.03, allowBackfeed = false }
      { id = "SS2", nodeId = 2, emf = 900, internalResistance = 0.03, allowBackfeed = false }
      { id = "SS3", nodeId = 3, emf = 900, internalResistance = 0.03, allowBackfeed = false }
      { id = "SS4", nodeId = 4, emf = 900, internalResistance = 0.03, allowBackfeed = false }
      { id = "SS5", nodeId = 5, emf = 900, internalResistance = 0.03, allowBackfeed = false }
      { id = "SS6", nodeId = 6, emf = 900, internalResistance = 0.03, allowBackfeed = false }
      { id = "SS7", nodeId = 7, emf = 900, internalResistance = 0.03, allowBackfeed = false }
      { id = "SS8", nodeId = 8, emf = 900, internalResistance = 0.03, allowBackfeed = false }
      { id = "SS9", nodeId = 9, emf = 900, internalResistance = 0.03, allowBackfeed = false }
      { id = "SS10", nodeId = 10, emf = 900, internalResistance = 0.03, allowBackfeed = false }
      { id = "SS11", nodeId = 11, emf = 900, internalResistance = 0.03, allowBackfeed = false }
      { id = "SS12", nodeId = 12, emf = 900, internalResistance = 0.03, allowBackfeed = false }
      { id = "SS13", nodeId = 13, emf = 900, internalResistance = 0.03, allowBackfeed = false }
    ]

    # Where DcSimApp should place the train anchor node.
    # This node (99) must be in nodes[] above and be “loose” from the start.
    # this parameter shall be handled internally and removed
    anchorNodeId = 99
  }

  # Elgränser för TrainLoad (som läser Excel-profilen)
  trains {
    defaults {
      maxVoltage    = 1000.0    # Vmax: över denna blockeras regen (dissiperas)
      minVoltage    = 500.0     # Vmin: under denna får bara AUX ligga kvar
      cutoffVoltage = 600.0
      maxCurrentA   = 1e30
    }
  }

  electrics.substations.defaults {
    allowBackfeed = false
    maxCurrentA   = 0.0       # <= 0 disables current limit (no setMaxCurrent())
  }

  # Track-metadata (bara etiketter för profilen)
  track {
    stations = [
    { name = "FRÄ", abbreviation = "FRÄ", position = "1 1+800" }
    { name = "VÄT", abbreviation = "VÄT", position = "1 2+350" }
    { name = "HSÅ", abbreviation = "HSÅ", position = "1 3+135" }
    { name = "TFP", abbreviation = "TFP", position = "1 4+390" }
    { name = "MIK", abbreviation = "MIK", position = "1 5+184" }
    { name = "LIH", abbreviation = "LIH", position = "1 6+448" }
    { name = "HOT", abbreviation = "HOT", position = "1 7+432" }
    { name = "ZID", abbreviation = "ZID", position = "1 8+164" }
    { name = "MRT", abbreviation = "MRT", position = "1 8+852" }
    { name = "SLU", abbreviation = "SLU", position = "1 9+810" }
    { name = "GAS", abbreviation = "GAS", position = "1 10+346" }
    { name = "TCE", abbreviation = "TCE", position = "1 11+445" }
    { name = "ÖMT", abbreviation = "ÖMT", position = "1 12+583" }
    { name = "STD", abbreviation = "STD", position = "1 13+342" }
    { name = "TEH", abbreviation = "TEH", position = "1 14+278" }
    { name = "UNT", abbreviation = "UNT", position = "1 16+775" }
    { name = "BEH", abbreviation = "BEH", position = "1 18+761" }
    { name = "DAS", abbreviation = "DAS", position = "1 20+3" }
    { name = "MÖR", abbreviation = "MÖR", position = "1 20+979" }
    ]
  }

  # Trafikplan: ett tåg T1
  traffic {
    timetable {
      trains = [
        { id = "T1", templateId = "T1", departure = "00:00:00", count = 1 }
      ]
    }
    templates = {
      T1 = {
        stops = [
    { signature = "FRÄ",   departure = "0", }
    { signature = "VÄT", arrival = "0.000629934346588104",   departure = "0.000803545457699215", }
    { signature = "HSÅ", arrival = "0.00166757397933996",   departure = "0.00184118509045107", }
    { signature = "TFP", arrival = "0.00297717808412923",   departure = "0.00316236326931442", }
    { signature = "MIK", arrival = "0.00407873989613938",   departure = "0.0042523510072505", }
    { signature = "LIH", arrival = "0.00544883873984944",   departure = "0.00568032022133092", }
    { signature = "HOT", arrival = "0.00680948168429255",   departure = "0.00700624094355181", }
    { signature = "ZID", arrival = "0.00787106086200041",   departure = "0.00804467197311153", }
    { signature = "MRT", arrival = "0.00883110941657127",   departure = "0.00901629460175645", }
    { signature = "SLU", arrival = "0.0101004748714418",   departure = "0.0103666785751455", }
    { signature = "GAS", arrival = "0.0111807448570049",   departure = "0.0113890781903382", }
    { signature = "TCE", arrival = "0.0125603171124507",   departure = "0.0128496689643026", }
    { signature = "ÖMT", arrival = "0.0143354968737741",   departure = "0.0145554042811815", }
    { signature = "STD", arrival = "0.0155204397197471",   departure = "0.0157171989790064", }
    { signature = "TEH", arrival = "0.0167011695660644",   departure = "0.0169442251216199", }
    { signature = "UNT", arrival = "0.0189405690184745",   departure = "0.0191373282777337", }
    { signature = "BEH", arrival = "0.0210079401533892",   departure = "0.0211931253385744", }
    { signature = "DAS", arrival = "0.0223882979681533",   departure = "0.0226082053755607", }
    { signature = "MÖR", arrival = "0.0236111111111111", }
        ]
      }
    }
  }

  # Effektprofiler – LÄS FRÅN DISK (Excel)
  powerProfiles {
    motoringAndAuxiliariesInSameModel = false
    auxiliaryPower = 0
    templates = [
      {
        id     = "T1"
        folder = "project/3subs1train/T1"   # relativt körkatalogen
        legs = [
          {  fromStation = "FRÄ", toStation = "VÄT", file = "t/r/1n_timetable_-VÄT.xlsx" }
        {  fromStation = "VÄT", toStation = "HSÅ", file = "t/r/1n_timetable_-HSÅ.xlsx" }
        {  fromStation = "HSÅ", toStation = "TFP", file = "t/r/1n_timetable_-TFP.xlsx" }
        {  fromStation = "TFP", toStation = "MIK", file = "t/r/1n_timetable_-MIK.xlsx" }
        {  fromStation = "MIK", toStation = "LIH", file = "t/r/1n_timetable_-LIH.xlsx" }
        {  fromStation = "LIH", toStation = "HOT", file = "t/r/1n_timetable_-HOT.xlsx" }
        {  fromStation = "HOT", toStation = "ZID", file = "t/r/1n_timetable_-ZID.xlsx" }
        {  fromStation = "ZID", toStation = "MRT", file = "t/r/1n_timetable_-MRT.xlsx" }
        {  fromStation = "MRT", toStation = "SLU", file = "t/r/1n_timetable_-SLU.xlsx" }
        {  fromStation = "SLU", toStation = "GAS", file = "t/r/1n_timetable_-GAS.xlsx" }
        {  fromStation = "GAS", toStation = "TCE", file = "t/r/1n_timetable_-TCE.xlsx" }
        {  fromStation = "TCE", toStation = "ÖMT", file = "t/r/1n_timetable_-ÖMT.xlsx" }
        {  fromStation = "ÖMT", toStation = "STD", file = "t/r/1n_timetable_-STD.xlsx" }
        {  fromStation = "STD", toStation = "TEH", file = "t/r/1n_timetable_-TEH.xlsx" }
        {  fromStation = "TEH", toStation = "UNT", file = "t/r/1n_timetable_-UNT.xlsx" }
        {  fromStation = "UNT", toStation = "BEH", file = "t/r/1n_timetable_-BEH.xlsx" }
        {  fromStation = "BEH", toStation = "DAS", file = "t/r/1n_timetable_-DAS.xlsx" }
        {  fromStation = "DAS", toStation = "MÖR", file = "t/r/1n_timetable_-MÖR.xlsx" }
        ]
      }
    ]
    # OBS: lämna ev. "constantKW" Helt bortkommenterat – annars körs konstant last.
  }

  # Viktigt: nollställ ankarets CP-last så Excel blir den ENDA lasten från tåget
  train {
    vMS     = 25.0      # används bara för x(t) i ankaret
    pW      = 0.0       # <— gör ankaret strömlöst (ingen konstant CP-last)
    Rmin    = 5e-6
    epsFrac = 1e-4
  }
}
