# ---------- ROOT-LEVEL (för kod som läser utan "dcsim.") ----------
simulationControl {
  tickDurationSec = 1.0
  simulationStart = "08:00:00"
  stopAfterSteps  = 3
}

grid {
  groundNodeId = 0
  anchorNodeId = 2
  nodes = [
    { id = 0, position = "g"  },
    { id = 1, position = "S1" },
    { id = 2, position = "T1" }
  ]
  substations = [
    { id = "S1", nodeId = 1, emf = 1000.0, internalResistance = 0.05 }
  ]
  lines = [
    { from = 1, to = 2, resistance = 0.10, category = "u" }
  ]
}

# Viktigt för A3: en konstant motordragning (motoring) på +1000 kW
powerProfiles {
  templates = [
    { id = "T1", constantKW = 900.0, duration = "00:10:00" }
  ]
}

traffic {
  timetable {
    trains = [
      { id = "T1", templateId = "T1", departure = "08:00:00" }
    ]
  }
}

trains.defaults {
  cutoffVoltage = 850.0
  maxVoltage    = 1000.0
  maxCurrentA   = 4000.0
}

# Standard: inga backfeed i A3
electrics.substations.defaults.allowBackfeed = false


# ---------- DCSIM-NAMESPACE (för kod som läser under "dcsim.") ----------
dcsim {
  simulationControl = ${simulationControl}
  grid              = ${grid}
  powerProfiles     = ${powerProfiles}
  traffic           = ${traffic}
  trains {
    defaults = ${trains.defaults}
  }
  electrics {
    substations {
      defaults {
        allowBackfeed = ${electrics.substations.defaults.allowBackfeed}
      }
    }
  }
}
