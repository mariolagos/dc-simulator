dcsim {
  simulationControl {
    tickDuration    = 1.0
    simulationStart = "08:00:00"
    simulationEnd   = "08:00:10"
    simulationSpeed = "FAST"
  }

  trains {
    defaults { cutoffVoltage = 850.0, maxVoltage = 1000.0, maxCurrentA = 4000.0 }
    overrides {
      T1 { cutoffVoltage = 1000.0, maxVoltage = 1100.0, maxCurrentA = 4000.0 }
    }
  }

  electrics {
    substations {
      defaults { allowBackfeed = false, maxCurrentA = 10000.0 }
      overrides {
        # Enda absorberande stationen – men med hård begränsning (≈200 kW vid ~1000 V)
        S2 { allowBackfeed = true, maxCurrentA = 200.0 }
      }
    }
  }

  grid {
    groundNodeId = 0
    anchorNodeId = 2
    nodes = [
      { id = 0, position = "g"       },
      { id = 1, position = "S1"      },
      { id = 2, position = "mid/T1"  },
      { id = 3, position = "S3"      }
    ]
    lines = [
      { from = 1, to = 2, resistance = 0.10, category = "u" },
      { from = 2, to = 3, resistance = 0.10, category = "u" },
      { from = 1, to = 2, resistance = 0.10, category = "f" },
      { from = 2, to = 3, resistance = 0.10, category = "f" }
    ]
    substations = [
      { id = "S1", nodeId = 1, emf = 1000.0, internalResistance = 0.05 },
      { id = "S2", nodeId = 2, emf = 1000.0, internalResistance = 0.05 }, # backfeed + Imax=200A
      { id = "S3", nodeId = 3, emf = 1000.0, internalResistance = 0.05 }
    ]
  }

  traffic {
    timetable { trains = [ { id="T1", templateId="T1", departure="08:00:00" } ] }
  }

  powerProfiles {
    motoringAndAuxiliariesInSameModel = false
    auxiliaryPower = 0.0
    templates = [ { id="T1", constantKW=-500.0, duration="00:00:10" } ]
  }
}
