# =========================
#  DcSim scenario: 3subs1train
#  - 3 stationer (SS0, SS1, SS2)
#  - 1 linje mellan varje station, 1.5 km vardera
#  - 1 tåg, konstant hastighet från power template (speedKPH)
# =========================
dcsim {

  # ---- Simstyrning ----
  simulationControl {
    tickDurationSec = 0.05         # sim-steg (s)
    simulationStart = "00:00:00"   # starttid
    simulationEnd   = "00:02:00"   # sluttid (ändra fritt)
    simulationSpeed = FAST         # eller REAL_TIME
    # stopAfterSteps = 2400        # alternativt hårt steg-stop om du vill
  }

  # ---- Nätmodell ----
  grid {
    groundNodeId = 0               # definiera en jordnod (0)

    # (valfritt) För läsbarhet; GridModelLoader kan också härleda noder från linjerna
    nodes = [
      { id = 0, name = "GND", position = "1 0+100"     }
      { id = 1, name = "N0", position = "1 0+000"      }     # SS0
      { id = 2, name = "N1", position = "1 1+500"      }     # SS1 (mitt)
      { id = 3, name = "N2", position = "1 0+000"      }     # SS2
      { id = 99, name = "ANCHOR", position = "1 0+000" } # dynamisk tågankarnod (måste finnas i modellen)
    ]

    # Tipp: GridModelLoader bör beräkna total R = rPerKm * lengthM / 1000
    lines = [
      { id = "L0", from = 1, to = 2, lengthM = 1500, rPerKm = 0.50 }
      { id = "L1", from = 2, to = 3, lengthM = 1500, rPerKm = 0.50 }
    ]

    # DC-stationer (Thevenin → Norton i solvern)
    substations = [
      { id = "SS0", nodeId = 1, emf = 1000.0, internalResistance = 0.05, allowBackfeed = false }
      { id = "SS1", nodeId = 2, emf = 1000.0, internalResistance = 0.05, allowBackfeed = false }
      { id = "SS2", nodeId = 3, emf = 1000.0, internalResistance = 0.05, allowBackfeed = false }
    ]

    # Var DcSimApp ska placera tågankarnoden.
    # Denna nod (99) måste finnas i nodes[] ovan och vara “lös” från början.
    anchorNodeId = 99
  }

  # ---- Kraftprofiler (mallar) ----
  powerProfiles {
    # Beräkningsprofil (kW över tiden) + hastighet i mallen
    templates = [
      {
        id = "IC200"
        speedKPH = 90                     # används av DcSimApp → vMS = 90/3.6
        points = [
          { time = "00:00:00", kW = 150000 }  # konstant dragkraft 150 kW
          { time = "00:05:00", kW = 150000 }  # (förläng vid behov)
        ]
      }
    ]

    # Övriga flaggor (DcSimApp läser dessa)
    motoringAndAuxiliariesInSameModel = true
    auxiliaryPower = 5000.0            # 5 kW hjälpsystem
  }

  # ---- Trafik (ett tåg) ----
  traffic {
    timetable {
      trains = [
        { id = "T1", templateId = "IC200", departure = "00:00:00" }
        # Vill du override:a hastighet per tåg:
        # { id = "T1", templateId = "IC200", departure = "00:00:00", speedMS = 27.78 }
      ]
    }
  }

  # ---- Tågankare (solver-parametrar) ----
  train {
    # Fallback-värden om mall/per-tåg saknar hastighet
    vMS     = 25.0
    pW      = 150000.0     # används av TrainAnchorComponent (konstant P)
    Rmin    = 1e-6         # liten skyddsresistans i splits
    epsFrac = 1e-3         # migreringströskel (andel av segmentlängd)
  }
}
