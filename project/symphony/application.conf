dcsim {
  simulationControl {
    tickDuration    = 1.0
    simulationStart = "08:00:00"
    simulationEnd   = "09:10:00"
  }

  track {
    stations = [
      { name = "Alto Flute",   abbreviation = "AFL", position = "1 0+170" },
      { name = "Bassoon",      abbreviation = "BAS", position = "1 1+170" },
      { name = "Cello",        abbreviation = "CEL", position = "1 2+220" },
      { name = "Double Bass",  abbreviation = "DBA", position = "1 3+665" },
      { name = "English Horn", abbreviation = "EHO", position = "1 5+095" },
      { name = "French Horn",  abbreviation = "FHO", position = "1 6+660" },
      { name = "Grand Piano",  abbreviation = "GPI", position = "1 7+770" }
    ]
  }

  grid {
    groundNodeId = 0

    nodes = [
      { id = 0, position = "1 0+000" },
      { id = 1, position = "1 0+170" },
      { id = 2, position = "1 1+170" },
      { id = 3, position = "1 2+220" },
      { id = 4, position = "1 3+665" },
      { id = 5, position = "1 5+095" },
      { id = 6, position = "1 6+660" },
      { id = 7, position = "1 7+770" }
