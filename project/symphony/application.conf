      { from = 2, to = 3, resistance = 0.076 },
      { from = 3, to = 4, resistance = 0.076 },
      { from = 4, to = 5, resistance = 0.076 },
      { from = 5, to = 6, resistance = 0.076 },
      { from = 6, to = 7, resistance = 0.076 }
