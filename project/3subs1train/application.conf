dcsim {
  # ----- Simulation control -----
  simulationControl {
    tickDurationSec = 1.0
    simulationStart = "08:00:00"
    simulationEnd   = "08:02:00"
    simulationSpeed = "FAST"
    # stopAfterSteps = 120
  }

  train {
    vMS     = 25.0      # m/s
    pW      = 150000.0  # W
    Rmin    = 1e-6      # Ohm
    epsFrac = 1e-3
  }

  # ----- Train electrical limits (defaults + per-train overrides) -----
  trains {
    defaults {
      cutoffVoltage = 850.0   # V: regen taper/block under/around denna
      maxVoltage    = 1000.0  # V: vid/över detta går all broms till resistor
      maxCurrentA   = 4000.0  # A: strömbegränsning
    }
    overrides {
      # Exempel:
      # T1 { maxCurrentA = 5000.0 }
    }
  }

  # ----- Substation behavior (diode / allow backfeed) -----
  electrics {
    substations {
      defaults {
        allowBackfeed = false
        maxCurrentA   = 3000.0
      }
      overrides {
        # Exempel:
        # S2 { allowBackfeed = true,  maxCurrentA = 5000.0 }
        # S3 { allowBackfeed = false, maxCurrentA = 3000.0 }
      }
    }
  }

  # ----- Grid topology -----
  grid {
    groundNodeId = 0
    # Viktigt: låt tåget ankra på en linjenod, inte samma som en stationbus
    anchorNodeId = 9

    nodes = [
      { id = 0, position = "1 0+100" }  # ground
      { id = 1, position = "1 0+000" }  # S1 bus
      { id = 2, position = "1 1+500" }  # S2 bus
      { id = 3, position = "1 3+000" }  # S3 bus
      { id = 9, position = "1 1+125" }  # ankare för tåg
    ]

    # Två parallella ledare (u/f) i två spann
    lines = [
      { from = 1, to = 9, resistance = 0.03, category = "u" },
      { from = 9, to = 2, resistance = 0.03, category = "u" },
      { from = 2, to = 3, resistance = 0.03, category = "u" },
    ]

    # Substationer modelleras mellan feeder-bus (“from”) och ground (“to”)
    substations = [
      { id = "S1", nodeId = 1, emf = 1000.0, internalResistance = 0.05 },
      { id = "S2", nodeId = 2, emf = 1000.0, internalResistance = 0.05 },
      { id = "S3", nodeId = 3, emf = 1000.0, internalResistance = 0.05 }
    ]
  }

  # ----- Track / geography (metadata för profiler) -----
  track {
    stations = [
      { name = "A", abbreviation = "A", position = "1 0+000" },
      { name = "B", abbreviation = "B", position = "1 1+100" }
    ]
  }

  # ----- Traffic plan -----
  traffic {
    timetable {
      trains = [
        { id = "T1", templateId = "T1", departure = "08:00:00", headway = "00:00:00", count = 1, signature = "A" }
      ]
    }
    templates = {
      T1 = {
        stops = [
          { signature = "A", departure = "08:00:00" },
          { signature = "B", arrival   = "08:01:09" }
        ]
      }
    }
  }

  # ----- Power profiles (train templates) -----
  powerProfiles {
    motoringAndAuxiliariesInSameModel = false
    auxiliaryPower = 0.0  # kW

    # Excel-profil (kräver filen nedan)
    templates = [
      {
        id     = "T1"
        folder = "project/3subs1train/T1"
        legs = [
         { fromStation = "A", toStation = "B", file = "A-B.xlsx" }
        ]
     }
    ]

    # --- Snabb sanity utan Excel: kommentera blocket ovan och avkommentera nedan ---
    # templates = [
    #   { id = "T1", constantKW = 1000.0, duration = "00:02:00" }  # 1.0 MW i 2 min
    # ]
  }
}
