dcsim {
  simulationControl {
    tickDurationSec = 1.0
    simulationStart = "08:00:00"
    simulationEnd   = "08:00:02"
    simulationSpeed = FAST
  }

  grid {
    groundNodeId = 0
    nodes = [
      { id = 0, position = "GND" },      # ground
      { id = 1, position = "BUS" }       # DC bus
    ]

    # En station: BUS(1) --> GND(0)
    substations = [
      { id = "S1", nodeId = 1, emf = 1000.0, internalResistance = 1.0 }  # E=1000 V, Rint=1 Ω
    ]

    # EN linje: last mot jord
    lines = [
      { from = 1, to = 0, resistance = 1.0, description = "load", category = "u" } # Rload = 1 Ω
    ]
  }

  # (inga tåg i A1)
}
