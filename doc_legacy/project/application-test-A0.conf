# Minimal config for Test A0 (Open Circuit)
dcsim {
  simulationControl {
    tickDurationSec = 1.0
    simulationStart = "08:00:00"
    simulationEnd   = "08:00:03"
    simulationSpeed = "FAST"
  }

  # No trains in A0
  trains {
    defaults {
      cutoffVoltage = 850.0
      maxVoltage    = 1000.0
      maxCurrentA   = 4000.0
    }
  }

  electrics {
    substations {
      defaults { allowBackfeed = false }
      overrides { }
    }
  }

  grid {
    groundNodeId = 0

    nodes = [
      { id = 0, position = "1 0+000" },    # ground
      { id = 1, position = "1 0+100" }     # bus
    ]

    # No lines, no trains
    lines = [ ]

    substations = [
      { id = "S1", nodeId = 1, emf = 1000.0, internalResistance = 0.05 }
    ]
  }

  # Empty traffic/power profiles for this test
  traffic { timetable { trains = [ ] } }
  powerProfiles { templates = [ ] }
}