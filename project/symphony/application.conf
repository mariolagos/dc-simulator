    templates = [
      {
        id = "T1"
        folder = "input/loads/T1"
        legs = [
          { fromStation = "AFL", toStation = "BAS", file = "AFL-BAS.xlsx" },
          { fromStation = "BAS", toStation = "CEL", file = "BAS-CEL.xlsx" },
          { fromStation = "CEL", toStation = "DBA", file = "CEL-DBA.xlsx" },
          { fromStation = "DBA", toStation = "EHO", file = "DBA-EHO.xlsx" },
