# =========================
#  DcSim scenario: 1sub5trains
#  - 1 station (SS0)
#  - 1 line between the stationand trains
#  - 5 trains on a simple line
#  - Both trains use the same T1 power profile, but with different departures
#    so that one is braking while the other is still motoring.
# =========================

dcsim {
  # ---- Simulation control ----
  simulationControl {
    tickDurationSec = 1.0
    simulationStart = "00:00:00"
    simulationEnd   = "00:02:00"   # 3.0 km / 25 m/s ≈ 120 s -> slutar vid ankomst
    simulationSpeed = "FAST"
    stopAfterSteps  = 10
  }

  export {
    # Reporting behavior (no physics is fabricated in the writer):
    #
    # false (recommended now): do NOT mirror negative traction (regen) as "P_brake".
    # true: purely a reporting trick — shows P_brake even though regen still flows in the network.
    #       This makes Balance != 0 whenever regen exists.
    treatNegativeBrakingAsBrake = false
    csvEveryNthStep = 1
  }

  # ---- Net model ----
  grid {
    groundNodeId = 0

    # Node positions
    # NOTE: for the moment the ground node must have a unique position, this restriction should be removed
    nodes = [
      { id = 0,  name = "GND",    position = "1 0+100" }
      { id = 1,  name = "N0",     position = "1 0+000" }   # SS0 @ 0 m
      { id = 99, name = "ANCHOR", position = "1 0+100" }   # fiktiv anchor node (static for now)
    ]

    # Catenaries
    lines = [
      { id = "L1", from = 1, to = 99, lengthM = 100,  rPerKm = 0.1 } #0.03
    ]

    # DC stations (Thevenin → Norton in the solver)
    substations = [
      { id = "SS0", nodeId = 1, emf = 900.0, internalResistance = 0.1, allowBackfeed = false }
    ]

    # Where DcSimApp should place the train anchor node.
    # This node (99) must be in nodes[] above and be “loose” from the start.
    # TODO: this parameter shall be handled internally and removed
    anchorNodeId = 99
  }

  # Elgränser för TrainLoad (som läser Excel-profilen)
    trains {
      defaults {
        maxVoltage    = 1000.0    # Vmax: över denna blockeras regen (dissiperas)
        minVoltage    = 500.0     # Vmin: under denna får bara AUX ligga kvar
        cutoffVoltage = 600.0
        maxCurrentA   = 1e30
        V_derate1     = 500.0     # under denna: ingen traction
        V_derate2     = 600.0     # här och uppåt: full traction
    }
  }

  electrics.substations.defaults {
    allowBackfeed = false
    maxCurrentA   = 0.0       # <= 0 disables current limit (no setMaxCurrent())
  }

  # Track-metadata (bara etiketter för profilen)
  track {
    stations = [
      { name = "A", abbreviation = "A", position = "1 0+000" }
      { name = "B", abbreviation = "B", position = "1 3+000" }
    ]
  }

  # Trafikplan: två tåg, båda använder T1-profilen med olika avgångstider
  traffic {
    timetable {
      trains = [
        { id = "Train1", templateId = "T1", departure = "00:00:00", count = 1 },
        { id = "Train2", templateId = "T1", departure = "00:00:10", count = 1 }
        { id = "Train3", templateId = "T1", departure = "00:00:20", count = 1 }
        { id = "Train4", templateId = "T1", departure = "00:00:30", count = 1 }
        { id = "Train5", templateId = "T1", departure = "00:00:40", count = 1 }
      ]
    }
    templates = {
      T1 = {
        stops = [
          { signature = "A", departure = "00:00:00" },
          { signature = "B", arrival   = "00:02:00" }   # matchar simulationEnd
        ]
      }
    }
  }

  # Effektprofiler – LÄS FRÅN DISK (Excel)
  powerProfiles {
    motoringAndAuxiliariesInSameModel = false
    auxiliaryPower = 0

    # Enkelt: återanvänd samma T1-profil för båda tåg.
    # Antingen:
    #  - kopiera mappen project/3subs1train/T1 -> project/3subs2trains/T1
    #  - eller låt folder peka på den gamla mappen (om du vill dela filen).
    templates = [
      {
        id     = "T1"
        folder = "project/1sub5trains/scenario1//T1"   # eller "project/3subs1train/T1" om du vill återanvända originalfilen
        legs = [
          { fromStation = "A", toStation = "B", file = "A-B.xlsx" }
        ]
      }
    ]
  }

  # Ankarets parametrar (statisk i v0.1 – rörelse/dynamik kommer i senare version)
  train {
    vMS     = 25.0      # används bara för x(t) i ankaret
    pW      = 0.0       # <— gör ankaret strömlöst (ingen konstant CP-last)
    Rmin    = 5e-6
    epsFrac = 1e-4
  }

  verbose {
    all = true   # sätt till false för normal tyst körning
  }

  # --- Projekt & scenario (delat med DcSimApp) ---
  projects.root = "project"
  run.project   = "3subs5trains"
  run.scenario  = "scenario1"

  # --- Stigar (styr explicit var longtable och pivots ligger) ---
  dcsim.paths {
    longtable = "${dcsim.projects.root}/${dcsim.run.project}/${dcsim.run.scenario}/longtable.csv"
    pivots_dir = "${dcsim.projects.root}/${dcsim.run.project}/${dcsim.run.scenario}/pivots"
  }

  # --- Kolumn-mapping (om longtable har andra headers) ---
  pivot.columns {
    time     = "time_s"
    kind     = "kind"
    id       = "id"
    V        = "V_V"
    I        = "I_A"
    P        = "P_W"
    req      = "req_W"
    pos      = "pos_m"
    speed    = "speed_mps"
    project  = "project"
    scenario = "scenario"
    hash     = "hash_tag"
    VA       = "V_A_V"
    VB       = "V_B_V"
    P_loss   = "P_loss_W"
  }

  # --- Presentation/format (kan nyttjas av CSV/Excel) ---
  pivot.format {
    decimals = 6
    locale   = "US"
  }
  pivot.units {
    power   = "W"
    energy  = "J"
    voltage = "V"
    current = "A"
  }
}

# Alias på toppnivå så att kod som gör getConfig("grid") fungerar
grid = ${dcsim.grid}
