dcsim {
  simulationControl {
    tickDurationSec = 1.0
    simulationStart = "08:00:00"
    simulationEnd   = "08:00:02"
    simulationSpeed = FAST
  }

  grid {
    groundNodeId = 0

    nodes = [
      { id = 0, position = "GND" },
      { id = 1, position = "BUS" }
    ]

    # One substation, oriented from bus -> ground
    substations = [
      { id = "S1", nodeId = 1, emf = 1000.0, internalResistance = 1.0 }
    ]

    # Pure resistive load from BUS to GND (use a Line to represent Rload = 1 Ω)
    lines = [
      { from = 1, to = 0, resistance = 1.0, description = "load", category = "u" }
    ]
  }

  # No trains in A2
}
